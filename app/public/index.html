<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Fixer - Professional Bug Tracking System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #e74c3c);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            text-align: center;
            margin-bottom: 0;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            background: white;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            padding: 30px;
        }

        .sidebar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            height: fit-content;
        }

        .main-panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
        }

        .form-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #e74c3c;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .btn-delete:hover {
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .bug-list {
            margin-top: 30px;
        }

        .bug-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .bug-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .bug-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .bug-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2c3e50;
            flex: 1;
        }

        .bug-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .status-pending {
            background: #ffeaa7;
            color: #d63031;
        }

        .status-in-progress {
            background: #74b9ff;
            color: #0984e3;
        }

        .status-completed {
            background: #00b894;
            color: #00cec9;
        }

        .severity-high {
            border-left: 5px solid #e74c3c;
        }

        .severity-medium {
            border-left: 5px solid #f39c12;
        }

        .severity-low {
            border-left: 5px solid #27ae60;
        }

        .bug-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .bug-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            font-size: 0.9em;
            color: #999;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .bug-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .no-bugs {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #495057;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .bug-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .severity-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .severity-high-badge {
            background: #e74c3c;
            color: white;
        }

        .severity-medium-badge {
            background: #f39c12;
            color: white;
        }

        .severity-low-badge {
            background: #27ae60;
            color: white;
        }



        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bug"></i> Bug Fixer</h1>
            <p>Professional Bug Tracking System</p>
            <p>COMSATS University - Spring 2025 - CSC483 DevOps Assignment</p>
        </div>

        <div class="main-content">
            <!-- Statistics Section -->
            <div class="stats-grid" id="bug-stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-bugs">0</div>
                    <div class="stat-label">Total Bugs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pending-bugs">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="in-progress-bugs">0</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completed-bugs">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="dashboard">
                <!-- Sidebar - Bug Creation -->
                <div class="sidebar">
                    <div class="form-section">
                        <h2><i class="fas fa-plus-circle"></i> Create New Bug</h2>
                        <form id="bug-form">
                            <div class="form-group">
                                <label for="bug-title"><i class="fas fa-tag"></i> Bug Title:</label>
                                <input type="text" id="bug-title" name="title" required placeholder="Enter bug title...">
                            </div>
                            
                            <div class="form-group">
                                <label for="bug-description"><i class="fas fa-align-left"></i> Description:</label>
                                <textarea id="bug-description" name="description" required placeholder="Describe the bug in detail..."></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label for="bug-priority"><i class="fas fa-exclamation-triangle"></i> Severity:</label>
                                <select id="bug-priority" name="priority">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="bug-status"><i class="fas fa-clock"></i> Status:</label>
                                <select id="bug-status" name="status">
                                    <option value="pending" selected>Pending</option>
                                    <option value="in-progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="bug-assignee"><i class="fas fa-user"></i> Assigned To:</label>
                                <input type="text" id="bug-assignee" name="assignedTo" placeholder="Enter assignee name...">
                            </div>
                            
                            <div class="form-group">
                                <label for="bug-steps"><i class="fas fa-list-ol"></i> Steps to Reproduce:</label>
                                <textarea id="bug-steps" name="stepsToReproduce" placeholder="1. Go to...&#10;2. Click on...&#10;3. Observe..."></textarea>
                            </div>
                            
                            <button type="submit" class="btn" id="submit-bug"><i class="fas fa-save"></i> Create Bug</button>
                            <button type="button" class="btn btn-secondary" id="clear-form"><i class="fas fa-eraser"></i> Clear Form</button>
                        </form>
                    </div>

                    <div class="form-section">
                        <h2><i class="fas fa-cogs"></i> Bug Management</h2>
                        <button class="btn btn-secondary" id="load-bugs"><i class="fas fa-sync"></i> Refresh Bugs</button>
                        <button class="btn btn-delete" id="delete-all"><i class="fas fa-trash"></i> Delete All</button>
                    </div>
                </div>

                <!-- Main Panel - Bug List -->
                <div class="main-panel">
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">All Bugs</button>
                        <button class="filter-btn" data-filter="pending">Pending</button>
                        <button class="filter-btn" data-filter="in-progress">In Progress</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                        <button class="filter-btn" data-filter="high">High Priority</button>
                    </div>



                    <div class="bug-list">
                        <h2><i class="fas fa-bug"></i> Bug Reports</h2>
                        <div id="bugs-container">
                            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading bugs...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class BugFixer {
            constructor() {
                this.bugs = [];
                this.currentFilter = 'all';
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadBugs();
            }

            bindEvents() {
                document.getElementById('bug-form').addEventListener('submit', (e) => this.createBug(e));
                document.getElementById('clear-form').addEventListener('click', () => this.clearForm());
                document.getElementById('load-bugs').addEventListener('click', () => this.loadBugs());
                document.getElementById('delete-all').addEventListener('click', () => this.deleteAllBugs());

                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.renderBugs(this.bugs);
                    });
                });
            }

            async createBug(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const bugData = Object.fromEntries(formData);
                try {
                    const response = await fetch('/api/bugs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bugData)
                    });
                    if (response.ok) {
                        this.clearForm();
                        await this.loadBugs();
                        alert('Bug created successfully!');
                    } else {
                        const error = await response.json();
                        alert('Error creating bug: ' + error.error);
                    }
                } catch (error) {
                    alert('Error creating bug: ' + error.message);
                }
            }

            async loadBugs() {
                try {
                    const response = await fetch('/api/bugs');
                    this.bugs = await response.json();
                    this.renderBugs(this.bugs);
                    this.updateStats();
                } catch (error) {
                    document.getElementById('bugs-container').innerHTML = 
                        '<div class="no-bugs"><i class="fas fa-exclamation-triangle"></i> Error loading bugs: ' + error.message + '</div>';
                }
            }

            renderBugs(bugs) {
                const container = document.getElementById('bugs-container');
                // Apply filter
                let filteredBugs = bugs;
                if (this.currentFilter !== 'all') {
                    if (this.currentFilter === 'high') {
                        filteredBugs = filteredBugs.filter(bug => (bug.priority || '').toLowerCase() === 'high');
                    } else {
                        filteredBugs = filteredBugs.filter(bug => (bug.status || '').toLowerCase() === this.currentFilter);
                    }
                }
                if (filteredBugs.length === 0) {
                    container.innerHTML = '<div class="no-bugs"><i class="fas fa-bug"></i> No bugs available</div>';
                    return;
                }
                container.innerHTML = filteredBugs.map(bug => `
                    <div class="bug-item severity-${bug.priority}" data-bug-id="${bug._id}">
                        <div class="bug-header">
                            <div class="bug-title">${bug.title}</div>
                            <div class="bug-status status-${bug.status}">${bug.status}</div>
                        </div>
                        <div class="bug-description">${bug.description}</div>
                        <div class="bug-meta">
                            <div class="bug-meta-item">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span class="severity-badge severity-${bug.priority}-badge">${(bug.priority || '').toUpperCase()}</span>
                            </div>
                            <div class="bug-meta-item">
                                <i class="fas fa-user"></i>
                                <span>${bug.assignedTo || 'Unassigned'}</span>
                            </div>
                            <div class="bug-meta-item">
                                <i class="fas fa-calendar"></i>
                                <span>Created: ${new Date(bug.createdAt).toLocaleDateString()}</span>
                            </div>
                            ${bug.stepsToReproduce ? `
                            <div class="bug-meta-item full-width">
                                <i class="fas fa-list-ol"></i>
                                <span><strong>Steps:</strong> ${bug.stepsToReproduce}</span>
                            </div>
                            ` : ''}
                        </div>
                        <div class="bug-actions">
                            <button class="btn btn-secondary" onclick="bugFixer.updateBugStatus('${bug._id}', 'in-progress')">
                                <i class="fas fa-play"></i> Start Work
                            </button>
                            <button class="btn" onclick="bugFixer.updateBugStatus('${bug._id}', 'completed')">
                                <i class="fas fa-check"></i> Mark Complete
                            </button>
                            <button class="btn btn-delete" onclick="bugFixer.deleteBug('${bug._id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            async updateBugStatus(bugId, status) {
                try {
                    const response = await fetch(`/api/bugs/${bugId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ status })
                    });

                    if (response.ok) {
                        this.loadBugs();
                    } else {
                        const error = await response.json();
                        alert('Error updating bug: ' + error.error);
                    }
                } catch (error) {
                    alert('Error updating bug: ' + error.message);
                }
            }

            async deleteBug(bugId) {
                if (confirm('Are you sure you want to delete this bug?')) {
                    try {
                        const response = await fetch(`/api/bugs/${bugId}`, {
                            method: 'DELETE'
                        });

                        if (response.ok) {
                            this.loadBugs();
                        } else {
                            const error = await response.json();
                            alert('Error deleting bug: ' + error.error);
                        }
                    } catch (error) {
                        alert('Error deleting bug: ' + error.message);
                    }
                }
            }

            async deleteAllBugs() {
                if (confirm('Are you sure you want to delete ALL bugs? This cannot be undone!')) {
                    try {
                        for (const bug of this.bugs) {
                            await fetch(`/api/bugs/${bug._id}`, { method: 'DELETE' });
                        }
                        this.loadBugs();
                    } catch (error) {
                        alert('Error deleting bugs: ' + error.message);
                    }
                }
            }



            clearForm() {
                document.getElementById('bug-form').reset();
            }

            updateStats() {
                const total = this.bugs.length;
                const pending = this.bugs.filter(b => b.status === 'pending').length;
                const inProgress = this.bugs.filter(b => b.status === 'in-progress').length;
                const completed = this.bugs.filter(b => b.status === 'completed').length;

                document.getElementById('total-bugs').textContent = total;
                document.getElementById('pending-bugs').textContent = pending;
                document.getElementById('in-progress-bugs').textContent = inProgress;
                document.getElementById('completed-bugs').textContent = completed;
            }
        }

        // Initialize the application
        const bugFixer = new BugFixer();
    </script>
</body>
</html>
